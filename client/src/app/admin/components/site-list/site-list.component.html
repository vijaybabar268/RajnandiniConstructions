<div style="width: 80%; margin: 0 auto;">
    <h4 class="text-center">Manage Sites</h4>

    <p class="mt-4">
        <a [routerLink]="['/admin/sites/new']" class="btn btn-primary">Add</a>
    </p>

    <table class="table table-bordered mt-4">
        <thead>
            <tr>
                <th>Site Name</th>
                <th>Description</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th class="text-center">Toggle Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let site of sites">
                <td>{{ site.title }}</td>
                <td>{{ site.description }}</td>
                <td>{{ site.startDate }}</td>
                <td>{{ site.endDate }}</td>
                <td>{{ site.status.name }}</td>
                <td class="text-center">
                    <a class="btn btn-link" (click)="toggleStatus(site.id)">
                        <span style="background: green; color: #fff; border-radius: 15px; display: inline-block; padding: 5px 15px;" *ngIf="site.isActive">Active</span>
                        <span style="background: orangered; color: #fff; border-radius: 15px; display: inline-block; padding: 5px 15px;" *ngIf="!site.isActive">Inactive</span>
                    </a>
                </td>
                <td>
                    <a class="btn-link" [routerLink]="['/admin/sites/view/', site.id]" style="text-decoration: none;">View</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
