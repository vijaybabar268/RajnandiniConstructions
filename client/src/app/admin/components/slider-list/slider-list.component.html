<div style="width: 80%; margin: 0 auto;">
    <h4 class="text-center">Manage Sliders</h4>

    <p class="mt-4">
        <a [routerLink]="['/admin/sliders/new']" class="btn btn-primary">Add</a>
    </p>

    <table class="table table-bordered mt-4">
        <thead>
            <tr>                
                <th class="text-center">Slider</th>
                <th>Title</th>
                <th>Description</th>
                <th class="text-center">Toggle Status</th>
                <th class="text-center">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let slide of sliders">                                
                <td class="text-center">
                    <img src="https://localhost:5001/uploads/admin/sliders/{{slide.url}}" class="img-thumbnail" height="180px" width="180px"/>
                </td>
                <td>{{ slide.title }}</td>
                <td>{{ slide.description }}</td>
                <td class="text-center">
                    <a class="btn btn-link" (click)="toggleStatus(slide.id)">
                        <span style="background: green; color: #fff; border-radius: 15px; display: inline-block; padding: 5px 15px;" *ngIf="slide.isActive">Active</span>
                        <span style="background: orangered; color: #fff; border-radius: 15px; display: inline-block; padding: 5px 15px;" *ngIf="!slide.isActive">Inactive</span>
                    </a>
                </td>
                <td class="text-center">
                    <a class="btn btn-primary" [routerLink]="['/admin/sliders/', slide.id]">Edit</a> &nbsp;
                    <a class="btn btn-danger" (click)="delete(slide.id)">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
