<div class="dashboard-container">
  <!-- Page Header -->
  <div class="page-header mb-4">
    <h1 class="page-title">Rajnandini Constructions</h1>
  </div>

  <!-- Stats Cards Grid -->
  <div class="stats-grid">
    <mat-card *ngFor="let stat of statCards" [ngClass]="'stat-card ' + stat.bgClass" class="stat-card-material">
      <mat-card-content>
        <div class="stat-content">
          <div class="stat-info">
            <p class="stat-label">{{ stat.title }}</p>
            <h2 class="stat-value">{{ stat.value }}</h2>
          </div>
          <div class="stat-icon">
            <mat-icon>{{ stat.icon }}</mat-icon>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <!-- Recent Sites Section -->
  <div class="recent-section">
    <mat-card class="recent-card">
      <mat-card-header>
        <mat-card-title>Recent Sites</mat-card-title>
        <button mat-button color="primary" routerLink="/admin/sites">View All</button>
      </mat-card-header>
      <mat-card-content class="table-content">
        <div class="mat-elevation-z1">
          <table mat-table [dataSource]="recentSites" class="dashboard-table">
            <!-- Project Name Column -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Project Name</th>
              <td mat-cell *matCellDef="let site"><strong>{{ site.name }}</strong></td>
            </ng-container>

            <!-- Location Column -->
            <ng-container matColumnDef="location">
              <th mat-header-cell *matHeaderCellDef>Location</th>
              <td mat-cell *matCellDef="let site">{{ site.location }}</td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let site">
                <mat-chip-set>
                  <mat-chip [color]="getStatusColor(site.status)" selected>
                    {{ site.status }}
                  </mat-chip>
                </mat-chip-set>
              </td>
            </ng-container>

            <!-- Progress Column -->
            <ng-container matColumnDef="progress">
              <th mat-header-cell *matHeaderCellDef>Progress</th>
              <td mat-cell *matCellDef="let site">
                <div class="progress-cell">
                  <mat-progress-bar 
                    mode="determinate" 
                    [value]="site.progress"
                    [color]="getProgressColor(site.progress)">
                  </mat-progress-bar>
                  <span class="progress-text">{{ site.progress }}%</span>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <!-- Quick Actions and Summary -->
  <div class="bottom-section">
    <!-- Quick Actions Card -->
    <mat-card class="quick-actions-card">
      <mat-card-header>
        <mat-card-title>Quick Actions</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="actions-grid">
          <button mat-raised-button color="primary" (click)="quickAction('add-project')">
            <mat-icon>add</mat-icon>
            Add New Site
          </button>
          <button mat-raised-button (click)="quickAction('manage-sites')" routerLink="/admin/sites">
            <mat-icon>location_on</mat-icon>
            Manage Sites
          </button>
          <button mat-raised-button (click)="quickAction('report')">
            <mat-icon>description</mat-icon>
            Generate Report
          </button>
          <button mat-raised-button (click)="quickAction('settings')">
            <mat-icon>settings</mat-icon>
            Settings
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Status Summary Card -->
    <mat-card class="summary-card">
      <mat-card-header>
        <mat-card-title>Status Summary</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="summary-item">
          <span class="summary-label">Total Projects:</span>
          <mat-chip-set>
            <mat-chip color="primary" selected>15</mat-chip>
          </mat-chip-set>
        </div>
        <div class="summary-item">
          <span class="summary-label">Completion Rate:</span>
          <mat-progress-bar mode="determinate" value="60" color="accent"></mat-progress-bar>
          <span class="progress-text mt-2">60%</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Last Updated:</span>
          <span class="updated-time">Just now</span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
